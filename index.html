<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提瓦特大冒險 - 網頁版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入外部 CSS 檔案 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 遊戲開始/讀檔畫面 -->
    <div id="modal-overlay">
        <div class="bg-slate-800 p-8 rounded-xl border-2 border-slate-600 text-center max-w-md w-full shadow-2xl">
            <h1 class="text-4xl font-bold text-yellow-400 mb-6" id="modal-title">大戰雷電影</h1>
            <p class="text-slate-300 mb-8" id="modal-desc">選擇要繼續上次的冒險，還是開始新的旅程？</p>
            <div class="flex flex-col gap-4" id="modal-buttons">
                <button id="btn-load" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg text-lg">載入上次存檔</button>
                <button id="btn-new" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-lg text-lg">開始新遊戲</button>
            </div>
        </div>
    </div>

    <!-- 主遊戲區 -->
    <div class="game-container">
        <!-- 左側：地圖 -->
        <div class="flex flex-col h-full">
            <div class="flex justify-between items-center mb-2">
                <h2 id="map-title" class="text-2xl font-bold text-cyan-400">地圖一：稻妻開放世界</h2>
            </div>
            <div id="map-grid" class="map-grid flex-grow"></div>
            
            <!-- 虛擬方向鍵 (主要供手機使用，桌面亦可用) -->
            <div class="controls grid grid-cols-3 gap-2 mt-4 max-w-xs mx-auto">
                <div></div>
                <button id="btn-up" class="bg-slate-700 hover:bg-slate-600 p-4 rounded shadow">W / ⬆️</button>
                <div></div>
                <button id="btn-left" class="bg-slate-700 hover:bg-slate-600 p-4 rounded shadow">A / ⬅️</button>
                <button id="btn-down" class="bg-slate-700 hover:bg-slate-600 p-4 rounded shadow">S / ⬇️</button>
                <button id="btn-right" class="bg-slate-700 hover:bg-slate-600 p-4 rounded shadow">D / ➡️</button>
            </div>
        </div>

        <!-- 右側：狀態與日誌 -->
        <div class="panel h-full flex flex-col">
            <!-- 狀態區 -->
            <div class="p-4 bg-slate-800" id="status-panel">
                <h3 class="text-lg font-bold text-yellow-400 border-b border-slate-600 pb-2 mb-2">隊伍狀態</h3>
                <div id="player-status" class="mb-2"></div>
                <div id="allies-status" class="text-sm space-y-1 mb-2"></div>
                <div id="boss-status-container" class="hidden mt-4">
                    <h3 class="text-lg font-bold text-purple-400 border-b border-slate-600 pb-2 mb-2">Boss 狀態</h3>
                    <div id="boss-status" class="text-sm"></div>
                </div>
            </div>

            <!-- 訊息日誌 -->
            <div id="log-container"></div>

            <!-- 動作按鈕 -->
            <div class="p-4 bg-slate-800 grid grid-cols-2 gap-2">
                <button id="btn-attack" class="col-span-2 bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-4 rounded disabled:opacity-50 disabled:cursor-not-allowed">
                    攻擊 (T) - 僅限Boss戰
                </button>
                <button id="btn-save" class="bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded">存檔 (I)</button>
                <button id="btn-quit" class="bg-slate-600 hover:bg-slate-500 text-white py-2 rounded">放棄 (Q)</button>
            </div>
        </div>
    </div>

    <!-- 引入外部 JavaScript 檔案 -->
    <script src="game.js"></script>
</body>
</html>
